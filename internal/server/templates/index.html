<!doctype html>
<html>
<head><meta charset="utf-8"/><title>tplug</title></head>
<body>
  <h1>tplug</h1>
  <p>Server is up.</p>
  <ul>
    <li>SSE: <code>/events/import</code></li>
    <li>SSE: <code>/events/auth</code></li>
    <li>SSE: <code>/events/status</code></li>
  </ul>

  <h2>Live auth stream</h2>
  <pre id="authlog" style="background:#111;color:#0f0;padding:8px;height:180px;overflow:auto;"></pre>

  <h2>Live import stream</h2>
  <pre id="importlog" style="background:#111;color:#0bf;padding:8px;height:180px;overflow:auto;"></pre>

  <script>
    function wire(id, url){
      const el = document.getElementById(id);
      function append(x){ el.textContent += x + '\n'; el.scrollTop = el.scrollHeight; }
      const es = new EventSource(url);
      es.onmessage = (e) => append(e.data);
      es.onerror = () => append('[[error]]');
    }
    wire('authlog','/events/auth?tenant=local');
    wire('importlog','/events/import?tenant=local');
  </script>
</body>
</html>
